<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="patinate: a heat trail building over a city grid.">
  <g stroke="#4a6741" fill="none" stroke-linecap="round">
    <!-- thin street grid -->
    <line x1="8"  y1="16" x2="56" y2="16" stroke-width="0.8"/>
    <line x1="8"  y1="28" x2="56" y2="28" stroke-width="0.8"/>
    <line x1="8"  y1="40" x2="56" y2="40" stroke-width="0.8"/>
    <line x1="8"  y1="52" x2="56" y2="52" stroke-width="0.8"/>
    <line x1="16" y1="8"  x2="16" y2="56" stroke-width="0.8"/>
    <line x1="28" y1="8"  x2="28" y2="56" stroke-width="0.8"/>
    <line x1="40" y1="8"  x2="40" y2="56" stroke-width="0.8"/>
    <line x1="52" y1="8"  x2="52" y2="56" stroke-width="0.8"/>
    <!-- arterials (the thicker through-routes) -->
    <line x1="8"  y1="34" x2="56" y2="34" stroke-width="2"/>
    <line x1="34" y1="8"  x2="34" y2="56" stroke-width="2"/>
    <!-- heat trail: three stacked strokes for the patina-buildup effect -->
    <path d="M 14 50 Q 24 42, 34 34 T 52 12" stroke-width="6" opacity="0.18"/>
    <path d="M 14 50 Q 24 42, 34 34 T 52 12" stroke-width="3.5" opacity="0.5"/>
    <path d="M 14 50 Q 24 42, 34 34 T 52 12" stroke-width="1.8" opacity="1"/>
  </g>
  <!-- home dot anchoring the trail -->
  <circle cx="14" cy="50" r="2.4" fill="#4a6741"/>
</svg>
