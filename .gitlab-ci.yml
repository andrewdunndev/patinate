stages:
  - check
  - deploy

default:
  tags: [storr]
  # Image must match rust-toolchain.toml. Bumping CI past MSRV is
  # intentional: clippy on the latest stable catches lints that older
  # toolchains don't have, so "CI green" actually means "clippy clean."
  image: rust:1.94

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUSTFLAGS: "-D warnings"

cache:
  key: cargo-${CI_COMMIT_REF_SLUG}
  paths:
    - .cargo/
    - target/

check:
  stage: check
  script:
    - rustc --version
    - cargo --version
    - cargo fmt -- --check
    - cargo clippy --all-targets -- -D warnings
    - cargo build --release
    - cargo test --lib
  artifacts:
    paths:
      - target/release/patinate
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# GitLab Pages: render the bundled fixture in `--web` mode and serve
# it through a small interactive demo. Only deploys from main; the
# generated `public/` directory is what GitLab serves.
pages:
  stage: deploy
  needs:
    - job: check
      artifacts: true
  script:
    # Defensive rebuild: do NOT remove. The artifact passes the binary
    # from `check:` via `needs.artifacts: true`, but cache eviction
    # across renamed branches has bitten us before; this rebuild is
    # the floor that round 2 + round 3 reviews specifically called out.
    - test -x ./target/release/patinate || cargo build --release
    - mkdir -p public
    # Privacy: the demo intentionally renders the SYNTHETIC bundled
    # fixture (`fixtures/activities.json`, athlete_id=1, fictional
    # gear IDs), never the maintainer's cached real Strava activity.
    # This keeps the public Pages site clean of any real-rider
    # identifiers in the SVG `data-*` attributes that the consumer
    # JS uses for filter behavior.
    - ./target/release/patinate render
        --config fixtures/config.toml
        --osm fixtures/grand-rapids.osm.json.gz
        --activities fixtures/activities.json
        --theme cycle_heat
        --web --transparent-bg
        --out public/heatmap-web.svg
    - cp examples/site/index.html public/index.html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
