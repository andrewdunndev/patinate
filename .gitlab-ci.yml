default:
  tags:
    - storr
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# v2.1.x catalog: auto-cancel build/test on superseded MR pushes;
# release-stage jobs (template-side interruptible: false) continue.
# on_job_failure: all stops the pipeline on a release-blocker fail.
#
# workflow.rules: prevent duplicate pipelines. When a branch has an
# open MR, suppress the redundant push pipeline and let the
# merge_request_event pipeline be the only pipeline for that commit
# (Renovate pushes land on a branch that already has an open MR, which
# otherwise fires BOTH a push and an MR-event pipeline for the same
# commit). Mirrors dunn.dev/othala's fix for the same defect.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG
  auto_cancel:
    on_new_commit: interruptible
    on_job_failure: all

stages:
  - lint
  - test
  - build
  - package
  - release
  - deploy
  - verdict
  - gate

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo
  # GitLab's own Secret-Detection template ships the SAME push-vs-MR
  # duplicate-pipeline problem this file's workflow.rules guard fixes
  # for our own jobs, gated behind this flag (see
  # Jobs/Secret-Detection.gitlab-ci.yml's 3-block
  # AST_ENABLE_MR_PIPELINES rules). Without it, secret_detection only
  # runs on the push pipeline -- which we now suppress on branches
  # with an open MR, so it'd silently stop running at all. Setting
  # this flips it onto the merge_request_event pipeline instead.
  AST_ENABLE_MR_PIPELINES: "true"

include:
  # GitLab Ultimate security scanner (preserved from bespoke CI).
  - template: Jobs/Secret-Detection.gitlab-ci.yml

  # Fail-closed automerge gate (adversarial-review finding N1).
  # Renovate automerges minor + patch on this repo; on GitLab the
  # automerge decision rides the aggregate pipeline status, so the
  # whole pipeline (lint + test + build above, plus the OSV verdict
  # below) must pass before Renovate native auto-merge proceeds.
  # osv-verdict emits CHECK_OSV via dotenv (newly-introduced findings
  # only on MRs); automerge-gate consumes it over needs: and blocks
  # unless every required check is present and pass.
  - component: gitlab.com/dunn.dev/pipeline/osv-verdict@3.0.0
  - component: gitlab.com/dunn.dev/pipeline/automerge-gate@3.0.0
    inputs:
      required-checks: "osv"

  # Lint: cargo fmt + clippy via the catalog's pinned ci-rust.
  - component: gitlab.com/dunn.dev/pipeline/rust-lint@3.0.0

  # Audit: cargo audit. Catalog default is allow_failure: true;
  # patinate previously overrode to false (audit_allow_failure:
  # false in the nomograph super-component) — preserved as a
  # job-level override below.
  - component: gitlab.com/dunn.dev/pipeline/rust-audit@3.0.0

  # Branch verification: cargo build + test on every push.
  #
  # job_name override: cloudflare-worker@3.0.0's "build" job (Astro
  # site, below) collided with this component's default job name
  # ("build" too). GitLab component includes merge on job-name key,
  # so cloudflare-worker's "build" silently clobbered this one —
  # cargo build/test hadn't run since ~2026-05-09. Distinct name
  # restores both jobs.
  - component: gitlab.com/dunn.dev/pipeline/rust-build@3.0.0
    inputs:
      package_path: .
      job_name: cargo-build

  # Tag-only: parallel:matrix cross-compile (linux/amd64+arm64,
  # darwin/arm64) via cargo-zigbuild + per-binary cosign signature
  # + per-binary .sha256 + upload to package registry.
  - component: gitlab.com/dunn.dev/pipeline/rust-release-binary@3.0.0
    inputs:
      binary_name: patinate
      package_name: patinate

  # Tag-only: CycloneDX SBOM per binary via syft.
  - component: gitlab.com/dunn.dev/pipeline/rust-sbom@3.0.0
    inputs:
      package_name: patinate

  # Tag-only: SLSA v1.0 provenance per binary, cosign-signed via
  # GitLab OIDC keyless. Language-agnostic; same template Go uses.
  - component: gitlab.com/dunn.dev/pipeline/slsa-attest@3.0.0

  # Tag-only: GitLab Release with binaries + SBOMs + attestations
  # linked. Idempotent across pipeline reruns.
  - component: gitlab.com/dunn.dev/pipeline/release-create@3.0.0
    inputs:
      package_name: patinate

  # Tag-only: idempotent crates.io publish. Requires
  # CARGO_REGISTRY_TOKEN as a masked, protected CI variable.
  - component: gitlab.com/dunn.dev/pipeline/rust-crates-publish@3.0.0
    inputs:
      crate_name: patinate

  # patinate.dunn.dev site at web/ — canonical web-starter Astro
  # scaffold per @dunn.dev/reference. Cloudflare Worker with bound
  # static assets, custom-domain binding declared in wrangler.toml.
  # Build runs on every push + MR; deploy runs only on main.
  #
  # The live heatmap embed (web/public/heatmap-web.svg) is
  # committed to the repo (rendered locally from
  # fixtures/activities.json + cached OSM basemap), so the deploy
  # pipeline doesn't need a Rust build. Regenerate the heatmap
  # when fixtures or theme renderer change.
  #
  # Privacy: the bundled fixture is public Strava segment
  # polylines (athlete IDs zeroed, gear IDs placeholders, names
  # generic). No real-rider identifiers ship.
  - component: gitlab.com/dunn.dev/pipeline/cloudflare-worker@3.0.0
    inputs:
      wrangler_config: web/wrangler.toml
      build_command: npm run build
      output_dir: web/dist
      needs_npm_install: true
      npm_dir: web
      production_url: https://patinate.dunn.dev

# Job-set parity for the workflow guard above: rust-lint (lint) and
# rust-audit (audit) ship with NO rules of their own, so they fall
# back to the classic implicit `only: [branches, tags]` default --
# which does NOT include merge_request_event. That made them
# push-pipeline only; with push suppressed on a branch with an open
# MR, they'd never run at all. Minimal consumer-side override:
# restate only `rules` (and, for audit, keep the pre-existing
# allow_failure: false override alongside it).
lint:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'

# Override audit to fail-the-build (was audit_allow_failure: false
# in the nomograph super-component; preserved here).
audit:
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_COMMIT_TAG'
