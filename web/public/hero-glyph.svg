<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 96" role="img" aria-label="patinate glyph: a heat trail accumulating over a city grid, anchored by a home dot.">
  <g stroke-linecap="round">
    <!-- light street grid -->
    <line x1="0"   y1="20"  x2="140" y2="20"  stroke="#c4b99a" stroke-width="0.7"/>
    <line x1="0"   y1="40"  x2="140" y2="40"  stroke="#c4b99a" stroke-width="0.7"/>
    <line x1="0"   y1="60"  x2="140" y2="60"  stroke="#c4b99a" stroke-width="0.7"/>
    <line x1="0"   y1="80"  x2="140" y2="80"  stroke="#c4b99a" stroke-width="0.7"/>
    <line x1="20"  y1="0"   x2="20"  y2="96"  stroke="#c4b99a" stroke-width="0.7"/>
    <line x1="44"  y1="0"   x2="44"  y2="96"  stroke="#c4b99a" stroke-width="0.7"/>
    <line x1="68"  y1="0"   x2="68"  y2="96"  stroke="#c4b99a" stroke-width="0.7"/>
    <line x1="92"  y1="0"   x2="92"  y2="96"  stroke="#c4b99a" stroke-width="0.7"/>
    <line x1="116" y1="0"   x2="116" y2="96"  stroke="#c4b99a" stroke-width="0.7"/>
    <!-- arterials -->
    <line x1="0"   y1="50"  x2="140" y2="50"  stroke="#6b5d4f" stroke-width="1.6"/>
    <line x1="68"  y1="0"   x2="68"  y2="96"  stroke="#6b5d4f" stroke-width="1.6"/>
    <!-- heat trail (three stacked strokes for the patina look) -->
    <path d="M 24 84 Q 50 70, 68 50 T 116 16" stroke="#ff5a1f" stroke-width="6" fill="none" opacity="0.18"/>
    <path d="M 24 84 Q 50 70, 68 50 T 116 16" stroke="#ff5a1f" stroke-width="4" fill="none" opacity="0.45"/>
    <path d="M 24 84 Q 50 70, 68 50 T 116 16" stroke="#ff5a1f" stroke-width="2" fill="none" opacity="0.95"/>
    <!-- a crossing route to show overlap -->
    <path d="M 124 80 Q 96 60, 78 44 T 36 14" stroke="#ff5a1f" stroke-width="5" fill="none" opacity="0.12"/>
    <path d="M 124 80 Q 96 60, 78 44 T 36 14" stroke="#ff5a1f" stroke-width="3" fill="none" opacity="0.36"/>
    <path d="M 124 80 Q 96 60, 78 44 T 36 14" stroke="#ff5a1f" stroke-width="1.5" fill="none" opacity="0.85"/>
    <!-- home dot -->
    <circle cx="24" cy="84" r="2.4" fill="#2c2417"/>
    <circle cx="24" cy="84" r="5" fill="none" stroke="#2c2417" stroke-width="0.7"/>
  </g>
</svg>
