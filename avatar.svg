<svg viewBox="0 0 256 256" width="256" height="256" font-family="Helvetica, Arial, sans-serif" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="patinate avatar: a city grid carries a heat path that builds where you ride often.">
  <g font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="256" height="256" fill="#ffffff"/>
  <rect x="0" y="0" width="256" height="256" fill="none" stroke="#e0e0e0" stroke-width="1"/>

  <!-- title block: y 0-90 -->
  <text x="128" y="56" text-anchor="middle" font-size="32" font-weight="700" fill="#4a6741">patinate</text>
  <text x="128" y="76" text-anchor="middle" font-size="10" fill="#707070">patina builds where you ride often</text>

  <!-- glyph band: y 90-200. Same 64-unit composition as the favicon
       and the site hero-glyph (single source of brand identity);
       scaled 1.5x and translated to fit the glyph band. -->
  <g transform="translate(80 100) scale(1.5)" stroke="#4a6741" fill="none" stroke-linecap="round">
    <line x1="8"  y1="20" x2="56" y2="20" stroke-width="0.6"/>
    <line x1="8"  y1="44" x2="56" y2="44" stroke-width="0.6"/>
    <line x1="20" y1="8"  x2="20" y2="56" stroke-width="0.6"/>
    <line x1="44" y1="8"  x2="44" y2="56" stroke-width="0.6"/>
    <line x1="8"  y1="32" x2="56" y2="32" stroke-width="1.5"/>
    <line x1="32" y1="8"  x2="32" y2="56" stroke-width="1.5"/>
    <path d="M 14 50 Q 24 42, 32 32 T 52 14" stroke-width="1.8"/>
    <circle cx="14" cy="50" r="2.2" fill="#4a6741" stroke="none"/>
  </g>

  <!-- output line: y 200-256 -->
  <line x1="40" y1="200" x2="216" y2="200" stroke="#e0e0e0" stroke-width="1"/>
  <text x="128" y="218" text-anchor="middle" font-size="9" font-weight="600" fill="#0a0a0a">poster · inline svg · privacy-aware coords</text>
  <text x="128" y="232" text-anchor="middle" font-size="8" fill="#707070">rust · cli · single household</text>
  </g>
</svg>
