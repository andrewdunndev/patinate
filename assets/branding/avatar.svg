<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', 'Courier New', monospace">
  <!-- Outer paper fill -->
  <rect x="0" y="0" width="256" height="256" fill="#faf6ed"/>
  <!-- Inset frame -->
  <rect x="20" y="20" width="216" height="216" fill="none" stroke="#2c2417" stroke-width="4"/>
  <!-- Header bar -->
  <rect x="28" y="28" width="200" height="36" fill="#2c2417"/>
  <text x="128" y="53" text-anchor="middle" font-size="20" fill="#faf6ed" font-weight="bold">patinate</text>

  <!-- Schematic: minimal city grid (one E-W + one N-S arterial) with a
       curved heat route passing through, anchored by a home dot. -->
  <line x1="48" y1="142" x2="208" y2="142"
        stroke="#6b5d4f" stroke-width="1.5"/>
  <line x1="128" y1="80" x2="128" y2="208"
        stroke="#6b5d4f" stroke-width="1.5"/>
  <path d="M 60 198 Q 100 176, 128 142 T 200 88"
        stroke="#2c2417" stroke-width="3" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="60" cy="198" r="4" fill="#2c2417"/>

  <!-- Base line (matches dunn.dev avatar spec) -->
  <line x1="60" y1="228" x2="196" y2="228"
        stroke="#c4b99a" stroke-width="2"/>
</svg>
